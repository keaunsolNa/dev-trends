name: Daily Dev Trends

on:
  schedule:
    # 08:00 KST = 23:00 UTC (GitHub cron runs in UTC, may be delayed 5~15min)
    - cron: '0 23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch & notify
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STACK_EXCHANGE_KEY: ${{ secrets.STACK_EXCHANGE_KEY }}
        run: python fetch_trends.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "trends: $(TZ=Asia/Seoul date +%Y-%m-%d)"
            git push
          fi
